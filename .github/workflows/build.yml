name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + Test (windows-latest)
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      # Actions pinned to commit SHAs (audit S3): a mutable tag like @v4 can be
      # repointed at malicious code. Update the SHA deliberately when bumping.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2
        with:
          msbuild-architecture: x64

      - name: Restore
        # --locked-mode fails the build if restore would deviate from the committed
        # packages.lock.json (audit S1) — no floating deps sneak into a Store build.
        run: dotnet restore FlarePurge.sln --locked-mode

      - name: Build Core
        run: dotnet build src/FlarePurge.Core/FlarePurge.Core.csproj --configuration Release --no-restore

      - name: Build Tests
        run: dotnet build src/FlarePurge.Tests/FlarePurge.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test src/FlarePurge.Tests/FlarePurge.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: TestResults/**/*
          retention-days: 14

      - name: Build App (x64)
        run: >
          msbuild src/FlarePurge.App/FlarePurge.App.csproj
          /restore
          /p:Configuration=Release
          /p:Platform=x64
          /p:AppxBundlePlatforms="x64"
          /p:AppxBundle=Always
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxPackageDir=${{ github.workspace }}\msix-output\

      - name: Upload MSIX (x64)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: FlarePurge-msix-x64
          path: msix-output/**/*.msix
          if-no-files-found: warn
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-logs
          path: |
            **/*.binlog
            **/msbuild.log
          retention-days: 7
