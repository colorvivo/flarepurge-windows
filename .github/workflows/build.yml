name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + Test (windows-latest)
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Restore
        run: dotnet restore FlarePurge.sln

      - name: Build Core
        run: dotnet build src/FlarePurge.Core/FlarePurge.Core.csproj --configuration Release --no-restore

      - name: Build Tests
        run: dotnet build src/FlarePurge.Tests/FlarePurge.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test src/FlarePurge.Tests/FlarePurge.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*
          retention-days: 14

      - name: Build App (x64)
        run: >
          msbuild src/FlarePurge.App/FlarePurge.App.csproj
          /restore
          /p:Configuration=Release
          /p:Platform=x64
          /p:AppxBundlePlatforms="x64"
          /p:AppxBundle=Always
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxPackageDir=${{ github.workspace }}\msix-output\

      - name: Upload MSIX (x64)
        uses: actions/upload-artifact@v4
        with:
          name: FlarePurge-msix-x64
          path: msix-output/**/*.msix
          if-no-files-found: warn
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/*.binlog
            **/msbuild.log
          retention-days: 7
